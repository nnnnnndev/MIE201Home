<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 - Bond Potential Lab</title>
    <style>
        body { margin: 0; background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #ui-header { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        h2 { margin: 0; font-size: 0.8rem; font-weight: 300; opacity: 0.6; }

        #plot-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        svg { width: 85%; height: 75%; overflow: visible; }

        #control-panel { 
            position: absolute; top: 20px; right: 20px; 
            width: 320px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; padding: 20px; z-index: 20;
        }
        
        .atom-track { width: 100%; height: 60px; position: relative; display: flex; align-items: center; margin-bottom: 10px;}
        .atom { width: 25px; height: 25px; border-radius: 50%; position: absolute; transition: transform 0.1s; }
        #atom-fixed { left: 20px; background: #888; border: 1px solid #fff; }
        #atom-1 { left: 100px; border: 2px solid transparent; }
        #atom-2 { left: 100px; border: 2px solid #fff; display: none; }

        #r-label-container { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.75rem; text-transform: uppercase; margin: 10px 0; }

        #preset-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .preset-btn { 
            height: 35px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 4px;
            color: white; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .preset-btn.active-primary { border-width: 2px; box-shadow: 0 0 10px; }
        .preset-btn.active-secondary { border-width: 2px; border-style: dotted; }

        #compare-toggle {
            width: 100%; margin-top: 15px; height: 40px; border-radius: 4px; border: 1px solid #00ffff;
            background: rgba(0, 255, 255, 0.1); color: #00ffff; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        #compare-toggle.active { background: #00ffff; color: #000; }

        /* Graph Elements */
        .axis { stroke: rgba(255,255,255,0.3); stroke-width: 1.5; }
        .curve { fill: none; stroke-width: 3; opacity: 0.9; filter: drop-shadow(0 0 3px); }
        .tracker { transition: r 0.1s; filter: drop-shadow(0 0 5px currentColor); }
        .label { font-size: 12px; fill: rgba(255,255,255,0.6); }
        
        .r0-marker { opacity: 0.6; }
        .r0-line-dot { stroke-width: 1; stroke-dasharray: 4; }
        .r0-line-solid { stroke-width: 1.5; }
        .r0-text-solid { fill: #fff; font-size: 14px; font-weight: bold; }
        .r0-text-hollow { fill: none; stroke: #fff; stroke-width: 0.5; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-header">
        <h1>Bond Potential Lab</h1>
        <h2>Energy Well Visualization</h2>
    </div>

    <div id="control-panel">
        <div class="atom-track">
            <div id="atom-fixed" class="atom"></div>
            <div id="atom-1" class="atom"></div>
            <div id="atom-2" class="atom"></div>
        </div>
        
        <input type="range" id="r-slider" min="0.65" max="4.0" step="0.01" value="1.2" style="width: 100%; cursor: pointer;">
        <div id="r-label-container">(atomic distance)</div>
        
        <div id="preset-buttons">
            <button class="preset-btn" id="btn-1" onclick="handleBtnClick(1)">1 Metallic</button>
            <button class="preset-btn" id="btn-2" onclick="handleBtnClick(2)">2 Ionic</button>
            <button class="preset-btn" id="btn-3" onclick="handleBtnClick(3)">3 Covalent</button>
            <button class="preset-btn" id="btn-4" onclick="handleBtnClick(4)">4 Secondary</button>
        </div>

        <button id="compare-toggle" onclick="toggleCompare()">Compare: OFF</button>
    </div>

    <div id="plot-container">
        <svg viewBox="0 0 800 500">
            <line x1="50" y1="150" x2="750" y2="150" class="axis" /> 
            <line x1="100" y1="20" x2="100" y2="480" class="axis" />
            <text x="710" y="170" class="label">Distance (r)</text>
            <text x="60" y="50" class="label" transform="rotate(-90, 60, 50)">Energy (U)</text>

            <g id="group-2" visibility="hidden">
                <path id="curve-2" class="curve" d="" />
                <line id="r0-line-2" class="r0-line-solid r0-marker" />
                <text id="r0-label-2" class="r0-text-hollow r0-marker">r₀ (2)</text>
                <circle id="dot-2" class="tracker" r="6" />
            </g>

            <g id="group-1">
                <path id="curve-1" class="curve" d="" />
                <line id="r0-line-1" class="r0-line-dot r0-marker" />
                <text id="r0-label-1" class="r0-text-solid r0-marker">r₀ (1)</text>
                <circle id="dot-1" class="tracker" r="8" />
            </g>
        </svg>
    </div>

    <script>
        const bondPresets = {
            1: { name: "Metallic", eps: 70, sig: 1.0, color: "#00ffff" },
            2: { name: "Ionic", eps: 150, sig: 0.85, color: "#ff00ff" },
            3: { name: "Covalent", eps: 210, sig: 0.75, color: "#ffff00" },
            4: { name: "Secondary", eps: 18, sig: 1.3, color: "#00ff00" }
        };

        let typePrimary = 1;
        let typeSecondary = 2;
        let isComparing = false;

        const slider = document.getElementById('r-slider');
        const atom1 = document.getElementById('atom-1');
        const atom2 = document.getElementById('atom-2');

        function calculateU(r, eps, sig) {
            const ratio = sig / r;
            const r6 = Math.pow(ratio, 6);
            const r12 = r6 * r6;
            return 4 * eps * (r12 - r6);
        }

        function toggleCompare() {
            isComparing = !isComparing;
            const btn = document.getElementById('compare-toggle');
            btn.innerText = isComparing ? "Compare: ON" : "Compare: OFF";
            btn.classList.toggle('active');
            
            document.getElementById('group-2').setAttribute('visibility', isComparing ? 'visible' : 'hidden');
            atom2.style.display = isComparing ? 'block' : 'none';
            
            update();
        }

        function handleBtnClick(id) {
            if (id === typePrimary && !isComparing) return; // Ignore re-clicking primary
            if (isComparing && id === typePrimary) {
                // Swap if primary clicked during comparison
                [typePrimary, typeSecondary] = [typeSecondary, typePrimary];
            } else {
                // Shift: Secondary becomes Primary, new click becomes Secondary
                typePrimary = typeSecondary;
                typeSecondary = id;
            }
            update();
        }

        function update() {
            const r = parseFloat(slider.value);
            
            // Render Primary
            renderBond(1, typePrimary, r);
            
            // Render Secondary if comparing
            if (isComparing) {
                renderBond(2, typeSecondary, r);
            }

            // Sync Slider color to primary
            slider.style.accentColor = bondPresets[typePrimary].color;
            
            // Update UI Button states
            document.querySelectorAll('.preset-btn').forEach(b => {
                b.className = 'preset-btn'; // Reset
                b.style.borderColor = "#444";
                b.style.color = "#fff";
            });
            
            const pBtn = document.getElementById(`btn-${typePrimary}`);
            pBtn.classList.add('active-primary');
            pBtn.style.borderColor = bondPresets[typePrimary].color;
            pBtn.style.color = bondPresets[typePrimary].color;

            if (isComparing) {
                const sBtn = document.getElementById(`btn-${typeSecondary}`);
                sBtn.classList.add('active-secondary');
                sBtn.style.borderColor = bondPresets[typeSecondary].color;
                sBtn.style.color = bondPresets[typeSecondary].color;
            }
        }

        function renderBond(num, typeId, currentR) {
            const data = bondPresets[typeId];
            const curve = document.getElementById(`curve-${num}`);
            const dot = document.getElementById(`dot-${num}`);
            const atom = document.getElementById(`atom-${num === 1 ? '1' : '2'}`);
            const r0Line = document.getElementById(`r0-line-${num}`);
            const r0Text = document.getElementById(`r0-label-${num}`);

            // Draw Curve - HIGH RESOLUTION SEGMENTS (Step = 0.017)
            let points = [];
            for (let r = 0.6; r <= 6.0; r += 0.017) {
                const u = calculateU(r, data.eps, data.sig);
                const x = 100 + (r * 100);
                const y = 150 - u; 
                points.push(`${x},${Math.min(480, Math.max(10, y))}`);
            }
            curve.setAttribute('d', `M ${points.join(' L ')}`);
            curve.setAttribute('stroke', data.color);
            curve.style.filter = `drop-shadow(0 0 5px ${data.color})`;

            // Update Dot
            const u = calculateU(currentR, data.eps, data.sig);
            const dotX = 100 + (currentR * 100);
            const dotY = 150 - u;
            dot.setAttribute('cx', dotX);
            dot.setAttribute('cy', dotY);
            
            // Dot Color/Glow Logic
            const r0 = 1.122 * data.sig;
            const diff = currentR - r0;
            let statusColor = (Math.abs(diff) < 0.04) ? "#00ff00" : (diff < 0 ? "#ff4444" : "#ffaa00");
            dot.setAttribute('fill', statusColor);

            // Update Atom Visuals
            atom.style.transform = `translateX(${currentR * 50}px)`;
            atom.style.background = data.color;
            atom.style.boxShadow = `0 0 15px ${statusColor}`;

            // Update r0 Indicator Line 
            const r0X = 100 + (r0 * 100);
            const uMin = calculateU(r0, data.eps, data.sig);
            r0Line.setAttribute('x1', r0X); r0Line.setAttribute('y1', 150);
            r0Line.setAttribute('x2', r0X); r0Line.setAttribute('y2', 150 - uMin);
            r0Line.setAttribute('stroke', data.color);
            r0Text.setAttribute('x', r0X); r0Text.setAttribute('y', (150 - uMin) + 20); // Dynamic label placement
            if (num === 2) r0Text.style.stroke = data.color; // Secondary is hollow
        }

        window.addEventListener('keydown', (e) => {
            if (bondPresets[e.key]) handleBtnClick(parseInt(e.key));
        });

        slider.addEventListener('input', update);
        update();
    </script>
</body>
</html>
