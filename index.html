<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 Horizon</title>
    <style>
        body { margin: 0; background-color: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white;
            pointer-events: none; z-index: 10;
        }
        h1 { font-size: clamp(4rem, 12vw, 8rem); margin: 0; letter-spacing: 20px; font-weight: 900; 
             background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; letter-spacing: 8px; text-transform: uppercase; opacity: 0.5; margin-top: -10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>MIE 201</h1>
        <p>Mechanical & Industrial Engineering</p>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.15); // Adds the "Infinite" fading effect

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lighting - High contrast "Lab" style
        const pLight = new THREE.PointLight(0xffffff, 50, 100);
        pLight.position.set(0, 10, 0);
        scene.add(pLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // Lattice Settings: 30x30 = 900 Unit Cells
        const grid = 30; 
        const atomGeom = new THREE.SphereGeometry(0.1, 12, 12);
        const blueMat = new THREE.MeshPhongMaterial({ color: 0x3498db, shininess: 50 });
        const redMat = new THREE.MeshPhongMaterial({ color: 0xe74c3c, shininess: 50 });

        // Instancing for performance (approx 12,000 atoms)
        const corners = new THREE.InstancedMesh(atomGeom, blueMat, (grid+1)**2 * 2);
        const faces = new THREE.InstancedMesh(atomGeom, redMat, grid**2 * 3);
        
        let cIdx = 0, fIdx = 0;
        const dummy = new THREE.Object3D();

        for (let x = 0; x <= grid; x++) {
            for (let z = 0; z <= grid; z++) {
                // Ground layer + One layer up
                for (let y = 0; y <= 1; y++) {
                    dummy.position.set(x, y, z);
                    dummy.updateMatrix();
                    corners.setMatrixAt(cIdx++, dummy.matrix);

                    if (x < grid && y < 1) {
                        dummy.position.set(x + 0.5, y + 0.5, z);
                        dummy.updateMatrix();
                        faces.setMatrixAt(fIdx++, dummy.matrix);
                    }
                    if (z < grid && y < 1) {
                        dummy.position.set(x, y + 0.5, z + 0.5);
                        dummy.updateMatrix();
                        faces.setMatrixAt(fIdx++, dummy.matrix);
                    }
                    if (x < grid && z < grid) {
                        dummy.position.set(x + 0.5, y, z + 0.5);
                        dummy.updateMatrix();
                        faces.setMatrixAt(fIdx++, dummy.matrix);
                    }
                }
            }
        }
        scene.add(corners, faces);

        // Camera Setup (Low Horizon)
        camera.position.set(grid/2, 1.5, grid/2 + 5);
        camera.lookAt(grid/2, 0.5, grid/2 - 10);

        // Smooth "Drone" Controls
        const keys = {};
        const velocity = new THREE.Vector3();
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);

            // Flyover Movement Logic
            if (keys['KeyW'] || keys['ArrowUp']) velocity.z -= 0.005;
            if (keys['KeyS'] || keys['ArrowDown']) velocity.z += 0.005;
            if (keys['KeyA'] || keys['ArrowLeft']) velocity.x -= 0.005;
            if (keys['KeyD'] || keys['ArrowRight']) velocity.x += 0.005;

            // Apply friction/damping
            velocity.multiplyScalar(0.95);
            camera.position.add(velocity);

            // Subtle "Breathing" camera movement
            camera.position.y = 1.5 + Math.sin(Date.now() * 0.001) * 0.1;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
