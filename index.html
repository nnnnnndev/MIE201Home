<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 - Miller Logic</title>
    <style>
        body { margin: 0; background-color: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 10;
        }
        h1 { font-size: clamp(3rem, 10vw, 7rem); margin: 0; letter-spacing: 15px; font-weight: 900; 
             background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #mode-display { font-size: 1.2rem; color: #3498db; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }

        #controls-ui {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; gap: 20px; align-items: flex-end;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
        }
        .key-group { display: grid; grid-template-columns: repeat(3, 30px); gap: 5px; }
        .key { width: 30px; height: 30px; border: 1px solid #444; border-radius: 4px; 
               display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #888; }
        .key.active { background: #3498db; color: white; border-color: #3498db; box-shadow: 0 0 10px #3498db; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: #555; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>MIE 201</h1>
        <div id="mode-display">Initialzing...</div>
    </div>

    <div id="controls-ui">
        <div>
            <div class="key-group">
                <div></div><div id="key-W" class="key">W</div><div></div>
                <div id="key-A" class="key">A</div><div id="key-S" class="key">S</div><div id="key-D" class="key">D</div>
            </div>
            <div class="label">Flyover</div>
        </div>
        <div>
            <div class="key-group">
                <div id="key-1" class="key">1</div><div id="key-2" class="key">2</div><div id="key-3" class="key">3</div>
            </div>
            <div class="label">View Planes</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.08);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 2.5);
        light.position.set(10, 10, 10);
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.3));

        // --- Lattice Construction ---
        const grid = 12; // Moderate size for better frame rates
        const atomGeom = new THREE.SphereGeometry(0.12, 16, 16);
        const blueMat = new THREE.MeshPhongMaterial({ color: 0x3498db, transparent: true, opacity: 0.9 });
        const redMat = new THREE.MeshPhongMaterial({ color: 0xe74c3c, transparent: true, opacity: 0.9 });

        const corners = new THREE.InstancedMesh(atomGeom, blueMat, (grid+1)**3);
        const faces = new THREE.InstancedMesh(atomGeom, redMat, grid**3 * 3 * 2); 
        const latticeGroup = new THREE.Group();
        latticeGroup.add(corners, faces);
        scene.add(latticeGroup);

        const atomPositions = [];

        function buildLattice() {
            let cIdx = 0, fIdx = 0;
            const dummy = new THREE.Object3D();
            const offset = grid / 2;

            for (let x = 0; x <= grid; x++) {
                for (let y = 0; y <= grid; y++) {
                    for (let z = 0; z <= grid; z++) {
                        // Position centered at 0,0,0
                        const px = x - offset;
                        const py = y - offset;
                        const pz = z - offset;

                        dummy.position.set(px, py, pz);
                        dummy.updateMatrix();
                        corners.setMatrixAt(cIdx++, dummy.matrix);
                        atomPositions.push({ mesh: corners, id: cIdx - 1, x, y, z, baseColor: 0x3498db });

                        // Face Centers
                        if (x < grid && y < grid) {
                            dummy.position.set(px + 0.5, py + 0.5, pz);
                            dummy.updateMatrix();
                            faces.setMatrixAt(fIdx++, dummy.matrix);
                            atomPositions.push({ mesh: faces, id: fIdx - 1, x: x + 0.5, y: y + 0.5, z, baseColor: 0xe74c3c });
                        }
                        if (y < grid && z < grid) {
                            dummy.position.set(px, py + 0.5, pz + 0.5);
                            dummy.updateMatrix();
                            faces.setMatrixAt(fIdx++, dummy.matrix);
                            atomPositions.push({ mesh: faces, id: fIdx - 1, x, y: y + 0.5, z: z + 0.5, baseColor: 0xe74c3c });
                        }
                        if (x < grid && z < grid) {
                            dummy.position.set(px + 0.5, py, pz + 0.5);
                            dummy.updateMatrix();
                            faces.setMatrixAt(fIdx++, dummy.matrix);
                            atomPositions.push({ mesh: faces, id: fIdx - 1, x: x + 0.5, y, z: z + 0.5, baseColor: 0xe74c3c });
                        }
                    }
                }
            }
        }
        buildLattice();

        // --- Miller Logic & Camera Snapping ---
        const highlightColor = new THREE.Color(0xf1c40f);
        const mutedOpacity = 0.15;

        function setViewMode(h, k, l) {
            const display = document.getElementById('mode-display');
            const distance = grid * 1.5;

            // 1. Highlight Atoms on Plane: hx + ky + lz = integer
            atomPositions.forEach(atom => {
                const val = (atom.x * h) + (atom.y * k) + (atom.z * l);
                const isOnPlane = Math.abs(val % 1) < 0.01 || Math.abs(val % 1) > 0.99;
                
                const color = isOnPlane ? highlightColor : new THREE.Color(atom.baseColor);
                atom.mesh.setColorAt(atom.id, color);
            });
            corners.instanceColor.needsUpdate = true;
            faces.instanceColor.needsUpdate = true;

            // 2. Rotate Camera to Normal Vector [hkl]
            if (h === 0 && k === 0 && l === 0) {
                display.innerText = "Bulk Crystal (Flyover)";
            } else {
                display.innerText = `(${h}${k}${l}) Miller Plane`;
                // Target orientation based on Miller Indices
                const targetPos = new THREE.Vector3(h, k, l).normalize().multiplyScalar(distance);
                camera.position.lerp(targetPos, 0.1); // Smooth transition
                camera.lookAt(0, 0, 0);
            }
        }

        // --- Controls ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Digit1', 'Numpad1'].includes(e.code)) currentMode = [1, 0, 0];
            if (['Digit2', 'Numpad2'].includes(e.code)) currentMode = [1, 1, 0];
            if (['Digit3', 'Numpad3'].includes(e.code)) currentMode = [1, 1, 1];
            if (['Digit0', 'Numpad0'].includes(e.code)) currentMode = [0, 0, 0];
            
            const keyEl = document.getElementById('key-' + e.key.toUpperCase());
            if (keyEl) keyEl.classList.add('active');
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            const keyEl = document.getElementById('key-' + e.key.toUpperCase());
            if (keyEl) keyEl.classList.remove('active');
        });

        // --- Initialization ---
        let currentMode = [1, 0, 0]; // Default start
        latticeGroup.rotation.set(Math.random(), Math.random(), 0); // Random initial wrinkle
        camera.position.set(0, 0, grid * 1.5);

        const velocity = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // If no WASD keys are pressed, lerp toward the Miller view
            if (!keys['KeyW'] && !keys['KeyS'] && !keys['KeyA'] && !keys['KeyD']) {
                setViewMode(...currentMode);
            } else {
                // Flyover mode breaks the lock
                if (keys['KeyW']) velocity.z -= 0.01;
                if (keys['KeyS']) velocity.z += 0.01;
                if (keys['KeyA']) velocity.x -= 0.01;
                if (keys['KeyD']) velocity.x += 0.01;
                velocity.multiplyScalar(0.95);
                camera.position.add(velocity);
                camera.lookAt(0, 0, 0);
                document.getElementById('mode-display').innerText = "Manual Exploration";
            }

            latticeGroup.rotation.y += 0.0005; // Constant slow spin
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
