<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 - Materials Hero Final</title>
    <style>
        body { margin: 0; background-color: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 10;
            width: 95%; 
        }
        h1 { 
            font-size: clamp(1.2rem, 4vw, 2.8rem); 
            margin: 0; letter-spacing: 6px; font-weight: 900; color: #ffffff; 
            text-shadow: 0 0 15px rgba(255,255,255,0.7);
            text-transform: uppercase; white-space: nowrap; 
        }
        h2 { font-size: clamp(0.8rem, 2vw, 1.4rem); margin: 10px 0 5px 0; letter-spacing: 3px; font-weight: 400; opacity: 0.9; }
        h3 { font-size: clamp(0.5rem, 1.2vw, 0.8rem); margin: 0; letter-spacing: 2px; font-weight: 300; opacity: 0.5; text-transform: uppercase; }

        #controls-ui {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; gap: 15px; align-items: center;
            background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            z-index: 20;
        }
        .key-group { display: grid; grid-template-columns: repeat(3, 24px); gap: 3px; }
        .key { width: 24px; height: 24px; border: 1px solid #444; border-radius: 3px; 
               display: flex; align-items: center; justify-content: center; font-size: 0.55rem; color: #666; }
        .key.active { background: #00ffff; color: #000; border-color: #00ffff; box-shadow: 0 0 8px #00ffff; }
        
        #mode-info { border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px; min-width: 130px; }
        #mode-display { font-size: 0.75rem; color: #00ffff; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
        #sub-mode { font-size: 0.55rem; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>MIE 201: Intro to Materials Science</h1>
        <h2>Riccio College of Engineering</h2>
        <h3>Department of Mechanical & Industrial Engineering</h3>
    </div>

    <div id="controls-ui">
        <div class="key-group">
            <div></div><div id="key-W" class="key">W</div><div></div>
            <div id="key-A" class="key">A</div><div id="key-S" class="key">S</div><div id="key-D" class="key">D</div>
        </div>
        <div class="key-group">
            <div id="key-1" class="key">1</div><div id="key-2" class="key">2</div><div id="key-3" class="key">3</div>
        </div>
        <div id="mode-info">
            <div id="mode-display">---</div>
            <div id="sub-mode">Interactive Lattice</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.18); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "low-power" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); 
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.PointLight(0xffffff, 80);
        light.position.set(2, 2, 2);
        scene.add(light);

        // --- HARD-CODED COLORS ---
        const CYAN_HEX = 0x00ffff;
        const MAGENTA_HEX = 0xff00ff;
        const YELLOW_HEX = 0xffff00;

        const grid = 14; 
        const atomGeom = new THREE.SphereGeometry(0.12, 12, 12); // Compromise 12 segments
        const cyanMat = new THREE.MeshLambertMaterial({ color: CYAN_HEX });
        const magentaMat = new THREE.MeshLambertMaterial({ color: MAGENTA_HEX });

        const corners = new THREE.InstancedMesh(atomGeom, cyanMat, (grid+1)**3); 
        const faces = new THREE.InstancedMesh(atomGeom, magentaMat, grid**3 * 6); 
        const latticeGroup = new THREE.Group();
        latticeGroup.add(corners, faces);
        scene.add(latticeGroup);

        const atomData = [];
        let cIdx = 0, fIdx = 0;
        const dummy = new THREE.Object3D();
        const offset = grid / 2;

        for (let x = 0; x <= grid; x++) {
            for (let y = 0; y <= grid; y++) {
                for (let z = 0; z <= grid; z++) {
                    const px = x-offset; const py = y-offset; const pz = z-offset;
                    dummy.position.set(px, py, pz); dummy.updateMatrix();
                    corners.setMatrixAt(cIdx++, dummy.matrix);
                    // Force the base color to be Cyan in the data array
                    atomData.push({ mesh: corners, id: cIdx-1, x, y, z, base: CYAN_HEX });

                    // Face-centered atoms - Force base color to Magenta
                    if (x < grid && y < grid) {
                        dummy.position.set(px+0.5, py+0.5, pz); dummy.updateMatrix();
                        faces.setMatrixAt(fIdx++, dummy.matrix);
                        atomData.push({ mesh: faces, id: fIdx-1, x:x+0.5, y:y+0.5, z, base: MAGENTA_HEX });
                    }
                    if (y < grid && z < grid) {
                        dummy.position.set(px, py+0.5, pz+0.5); dummy.updateMatrix();
                        faces.setMatrixAt(fIdx++, dummy.matrix);
                        atomData.push({ mesh: faces, id: fIdx-1, x, y:y+0.5, z:z+0.5, base: MAGENTA_HEX });
                    }
                    if (x < grid && z < grid) {
                        dummy.position.set(px+0.5, py, pz+0.5); dummy.updateMatrix();
                        faces.setMatrixAt(fIdx++, dummy.matrix);
                        atomData.push({ mesh: faces, id: fIdx-1, x:x+0.5, y, z:z+0.5, base: MAGENTA_HEX });
                    }
                }
            }
        }

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        // ULTRA ZOOM: Deep inside the lattice
        camera.position.set(0, 0, grid * 0.35); 

        function updatePlanes(h, k, l) {
            const hColor = new THREE.Color(YELLOW_HEX);
            atomData.forEach(a => {
                const val = (a.x * h) + (a.y * k) + (a.z * l);
                const on = Math.abs(val % 1) < 0.03 || Math.abs(val % 1) > 0.97;
                // If not on the plane, we force it back to its specific HEX base
                a.mesh.setColorAt(a.id, on ? hColor : new THREE.Color(a.base));
            });
            corners.instanceColor.needsUpdate = true;
            faces.instanceColor.needsUpdate = true;
            document.getElementById('mode-display').innerText = `(${h}${k}${l}) Planes`;
        }

        function snap(h, k, l) {
            updatePlanes(h, k, l);
            const target = new THREE.Vector3(h, k, l).normalize().multiplyScalar(grid * 0.35);
            const start = camera.position.clone();
            let p = 0;
            const step = () => {
                p += 0.05;
                camera.position.lerpVectors(start, target, p);
                camera.lookAt(0,0,0);
                if (p < 1) requestAnimationFrame(step);
            };
            step();
        }

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Digit1', 'Numpad1'].includes(e.code)) snap(1, 0, 0);
            if (['Digit2', 'Numpad2'].includes(e.code)) snap(1, 1, 0);
            if (['Digit3', 'Numpad3'].includes(e.code)) snap(1, 1, 1);
            const el = document.getElementById('key-' + e.key.toUpperCase());
            if (el) el.classList.add('active');
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            const el = document.getElementById('key-' + e.key.toUpperCase());
            if (el) el.classList.remove('active');
        });

        function animate() {
            requestAnimationFrame(animate);
            const f = new THREE.Vector3(); camera.getWorldDirection(f);
            const s = new THREE.Vector3().crossVectors(camera.up, f).normalize();
            if (keys['KeyW']) camera.position.addScaledVector(f, 0.1);
            if (keys['KeyS']) camera.position.addScaledVector(f, -0.1);
            if (keys['KeyA']) camera.position.addScaledVector(s, 0.1);
            if (keys['KeyD']) camera.position.addScaledVector(s, -0.1);
            
            latticeGroup.rotation.y += 0.0006; 
            controls.update();
            renderer.render(scene, camera);
        }

        snap(1,1,1);
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
