<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 - Materials Science Splash</title>
    <style>
        body { margin: 0; background-color: #020205; overflow: hidden; font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; color: white; }
        canvas { display: block; }
        
        /* Centered Institutional Splash - Clean White and Muted */
        #ui {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 10;
            width: 95%; /* Wider container to allow one-line fitting */
        }
        h1 { 
            font-size: clamp(1.5rem, 4.2vw, 3rem); /* Smaller size to guarantee one line */
            margin: 0; 
            letter-spacing: 7px; /* Tightened slightly from 8px to aid fitting */
            font-weight: 900; 
            color: #ffffff; /* Clean White */
            text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 5px rgba(255,255,255,0.3); /* Fog/Glow effect */
            text-transform: uppercase; 
            line-height: 1.1; 
            white-space: nowrap; /* Force text onto one line */
        }
        h2 { font-size: clamp(0.9rem, 2.2vw, 1.6rem); margin: 15px 0 5px 0; letter-spacing: 4px; font-weight: 400; opacity: 0.9; color: #fff; }
        h3 { font-size: clamp(0.6rem, 1.3vw, 0.9rem); margin: 0; letter-spacing: 3px; font-weight: 300; opacity: 0.5; text-transform: uppercase; }

        /* Integrated Control UI in the bottom corner */
        #controls-ui {
            position: absolute; bottom: 25px; left: 25px;
            display: flex; gap: 20px; align-items: center;
            background: rgba(0,0,0,0.5); padding: 12px 18px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            z-index: 20;
        }
        .key-group { display: grid; grid-template-columns: repeat(3, 26px); gap: 4px; }
        .key { width: 26px; height: 26px; border: 1px solid #444; border-radius: 4px; 
               display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #777; transition: 0.1s; }
        .key.active { background: #00ffff; color: #000; border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .label { font-size: 0.5rem; text-transform: uppercase; color: #555; margin-top: 3px; text-align: center; letter-spacing: 1px; }

        /* Mode Display */
        #mode-info { border-left: 1px solid rgba(255,255,255,0.1); padding-left: 18px; min-width: 140px; }
        #mode-display { font-size: 0.8rem; color: #00ffff; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 3px; }
        #sub-mode { font-size: 0.6rem; color: #777; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>MIE 201: Intro to Materials Science</h1>
        <h2>Riccio College of Engineering</h2>
        <h3>Department of Mechanical & Industrial Engineering</h3>
    </div>

    <div id="controls-ui">
        <div>
            <div class="key-group">
                <div></div><div id="key-W" class="key">W</div><div></div>
                <div id="key-A" class="key">A</div><div id="key-S" class="key">S</div><div id="key-D" class="key">D</div>
            </div>
            <div class="label">Flyover</div>
        </div>
        <div>
            <div class="key-group">
                <div id="key-1" class="key">1</div><div id="key-2" class="key">2</div><div id="key-3" class="key">3</div>
            </div>
            <div class="label">Planes</div>
        </div>
        <div id="mode-info">
            <div id="mode-display">Initializing</div>
            <div id="sub-mode">Interactive Lattice</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // --- Core Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.1);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for better performance
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.PointLight(0xffffff, 80, 100);
        sun.position.set(10, 10, 10);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.3));

        // --- Lattice: STRICT Cyan and Magenta ---
        const grid = 12;
        const atomGeom = new THREE.SphereGeometry(0.12, 16, 16);
        const cyanMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 70 });
        const magentaMat = new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 70 });
        const planeHighlight = new THREE.Color(0xffff00); // Yellow highlight for accessibility, distinct from Cyan/Magenta

        const corners = new THREE.InstancedMesh(atomGeom, cyanMat, (grid+1)**3);
        const faces = new THREE.InstancedMesh(atomGeom, magentaMat, grid**3 * 6);
        const latticeGroup = new THREE.Group();
        latticeGroup.add(corners, faces);
        scene.add(latticeGroup);

        const atomData = [];

        function buildLattice() {
            let cIdx = 0, fIdx = 0;
            const dummy = new THREE.Object3D();
            const offset = grid / 2;

            for (let x = 0; x <= grid; x++) {
                for (let y = 0; y <= grid; y++) {
                    for (let z = 0; z <= grid; z++) {
                        const px = x - offset; const py = y - offset; const pz = z - offset;
                        dummy.position.set(px, py, pz); dummy.updateMatrix();
                        corners.setMatrixAt(cIdx++, dummy.matrix);
                        atomData.push({ mesh: corners, id: cIdx - 1, x, y, z, base: 0x00ffff });

                        if (x < grid && y < grid) {
                            dummy.position.set(px+0.5, py+0.5, pz); dummy.updateMatrix();
                            faces.setMatrixAt(fIdx++, dummy.matrix);
                            atomData.push({ mesh: faces, id: fIdx-1, x:x+0.5, y:y+0.5, z, base: 0xff00ff });
                        }
                        if (y < grid && z < grid) {
                            dummy.position.set(px, py+0.5, pz+0.5); dummy.updateMatrix();
                            faces.setMatrixAt(fIdx++, dummy.matrix);
                            atomData.push({ mesh: faces, id: fIdx-1, x, y:y+0.5, z:z+0.5, base: 0xff00ff });
                        }
                        if (x < grid && z < grid) {
                            dummy.position.set(px+0.5, py, pz+0.5); dummy.updateMatrix();
                            faces.setMatrixAt(fIdx++, dummy.matrix);
                            atomData.push({ mesh: faces, id: fIdx-1, x:x+0.5, y, z:z+0.5, base: 0xff00ff });
                        }
                    }
                }
            }
        }
        buildLattice();

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        camera.position.set(grid, grid/2, grid * 1.5);
        controls.update();

        // --- Miller Highlighting ---
        function updateMillerColors(h, k, l) {
            atomData.forEach(a => {
                const val = (a.x * h) + (a.y * k) + (a.z * l);
                // Highlight if val is near an integer (planes are repeating)
                const onPlane = Math.abs(val % 1) < 0.02 || Math.abs(val % 1) > 0.98;
                a.mesh.setColorAt(a.id, onPlane ? planeHighlight : new THREE.Color(a.base));
            });
            corners.instanceColor.needsUpdate = true;
            faces.instanceColor.needsUpdate = true;
        }

        function snapToMiller(h, k, l) {
            updateMillerColors(h, k, l);
            const dist = grid * 1.6;
            const targetPos = new THREE.Vector3(h, k, l).normalize().multiplyScalar(dist);
            
            const startPos = camera.position.clone();
            let progress = 0;
            const animateSnap = () => {
                progress += 0.05; // Slightly faster snap
                camera.position.lerpVectors(startPos, targetPos, progress);
                camera.lookAt(0, 0, 0);
                if (progress < 1) requestAnimationFrame(animateSnap);
            };
            animateSnap();
            document.getElementById('mode-display').innerText = `(${h}${k}${l}) Planes`;
            document.getElementById('sub-mode').innerText = "Fixed Perspective";
        }

        // --- Input Handlers ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['1', 'Numpad1', 'Digit1'].includes(e.code)) snapToMiller(1, 0, 0);
            if (['2', 'Numpad2', 'Digit2'].includes(e.code)) snapToMiller(1, 1, 0);
            if (['3', 'Numpad3', 'Digit3'].includes(e.code)) snapToMiller(1, 1, 1);
            
            let keyName = e.key.toUpperCase();
            const keyEl = document.getElementById('key-'+keyName) || document.getElementById('key-'+e.key);
            if (keyEl) keyEl.classList.add('active');
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            let keyName = e.key.toUpperCase();
            const keyEl = document.getElementById('key-'+keyName) || document.getElementById('key-'+e.key);
            if (keyEl) keyEl.classList.remove('active');
        });

        function handleWASD() {
            const moveSpeed = 0.12;
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            const side = new THREE.Vector3().crossVectors(camera.up, forward).normalize();

            if (keys['KeyW'] || keys['ArrowUp']) camera.position.addScaledVector(forward, moveSpeed);
            if (keys['KeyS'] || keys['ArrowDown']) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys['KeyA'] || keys['ArrowLeft']) camera.position.addScaledVector(side, moveSpeed);
            if (keys['KeyD'] || keys['ArrowRight']) camera.position.addScaledVector(side, -moveSpeed);
            
            if (keys['KeyW'] || keys['KeyA'] || keys['KeyS'] || keys['KeyD']) {
                document.getElementById('mode-display').innerText = "Manual";
                document.getElementById('sub-mode').innerText = "Free Exploration";
                // We keep OrbitControls updated to handle mouse rotation after flying
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            handleWASD();
            controls.update(); // handles both damping and OrbitControls updates
            renderer.render(scene, camera);
        }

        // --- Start up with random view ---
        const modes = [[1,0,0], [1,1,0], [1,1,1]];
        const startMode = modes[Math.floor(Math.random()*modes.length)];
        snapToMiller(...startMode);

        animate();

        // Handle scaling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
